name: Update Paper Data

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一 UTC 02:00（北京时间周一 10:00）
  workflow_dispatch:       # 支持手动触发

# Only allow one update at a time
concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install scraper dependencies
        run: |
          pip install -r scripts/requirements.txt
          scrapling install

      - name: Run scraper (Wanfang primary, CNKI fallback)
        run: python scripts/scraper.py
        continue-on-error: true

      - name: Check for data changes
        id: check
        run: |
          if git diff --quiet public/data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new papers found this run"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data updated:"
            git diff --stat public/data/
          fi

      - name: Commit updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/topics.json public/data/metadata.json
          git commit -m "chore: auto-update paper data $(date +'%Y-%m-%d')"
          git push
